version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(funcName)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  json:
    (): backend.logging_config.JsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  console_json:
    class: logging.StreamHandler
    level: DEBUG
    formatter: json
    stream: ext://sys.stdout

loggers:
  # ── Application ──
  backend:
    level: DEBUG
    handlers: [console]
    propagate: false

  backend.middleware:
    level: INFO
    handlers: [console]
    propagate: false

  core:
    level: DEBUG
    handlers: [console]
    propagate: false

  core.agent:
    level: INFO
    handlers: [console]
    propagate: false

  # ── External libraries — reduce noise ──
  httpx:
    level: WARNING
  httpcore:
    level: WARNING
  langchain:
    level: WARNING
  langgraph:
    level: WARNING
  openai:
    level: WARNING
  anthropic:
    level: WARNING
  uvicorn:
    level: INFO
  uvicorn.access:
    level: WARNING

root:
  level: INFO
  handlers: [console]
