[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "backend"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "core",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "sse-starlette>=3.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# Enable when scaling out to separate worker process
arq = ["arq>=0.26", "redis>=5.0"]

[tool.uv.sources]
core = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]
